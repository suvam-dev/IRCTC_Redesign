<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../style/navbar.css">
    <link rel="stylesheet" href="../style/footer.css">
    <link rel="stylesheet" href="../style/confirm.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-gray-100 bg-[url('../assets/loginbg.png')] bg-cover bg-center bg-no-repeat">
    <div class="h-20 ">
        <nav class="navbar"></nav>
    </div>
    <div
        class="flex flex-col justify-center items-center mt-[80px] bg-white/70shadow-xl h-auto p-10 m-3 rounded-2xl max-w-[650px] mx-auto border border-gray-100">
        <span class="text-teal-700 text-3xl font-extrabold mb-2">Booking Confirmed! 🎉
        </span>
        <span class="text-gray-500 text-md font-medium text-center mb-8" id="booking-details">Here is your digital
            ticket.</span>

        <!-- QR Code Container -->
        <div
            class="mt-4 mb-8 h-[220px] w-[220px] bg-white border-4 border-dashed border-gray-200 rounded-xl flex items-center justify-center p-2 shadow-sm">
            <img id="qr-code" src="" alt="Ticket QR Code" class="w-full h-full object-contain hidden" />
        </div>

        <div class="backbutton flex items-center bg-gray-900 hover:bg-gray-800 transition-all text-white rounded-full cursor-pointer px-6 py-3 shadow-lg hover:-translate-y-0.5 active:scale-95"
            onclick="window.location.href = '../index.html'">
            <div class="backbutton-icon bg-transparent mr-2">
                <i data-lucide="chevron-left" class="w-5 h-5"></i>
            </div>
            <div class="back font-bold text-sm tracking-wide">RETURN TO HOME</div>
        </div>
    </div>
    <div class="relative w-full h-[30vh]">
        <footer class="footer w-full bottom-0">
        </footer>
    </div>

    <script src="../src/navbar.js"></script>
    <script>
        lucide.createIcons();

        document.addEventListener("DOMContentLoaded", () => {
            // Read URL Params sent from the checkout page
            const params = new URLSearchParams(window.location.search);
            const trainName = params.get('trainName') || 'Train';
            const from = params.get('start') || '';
            const to = params.get('dest') || '';
            const numPassengers = params.get('num-passengers') || '1';

            // Update subtext slightly to personalize
            if (from && to) {
                document.getElementById("booking-details").innerText = `Your journey from ${from} to ${to} on ${trainName} for ${numPassengers} passenger(s) is secure.`;
            }

            // Generate a readable text block for the QR Code
            let ticketText = `TICKET CONFIRMATION\n-------------------\n`;
            ticketText += `Train: ${trainName} (${params.get('train') || ''})\n`;
            ticketText += `Route: ${from} to ${to}\n`;
            ticketText += `Time: ${params.get('t1') || ''} - ${params.get('t2') || ''}\n`;
            ticketText += `Passengers (${numPassengers}):\n`;

            for (let i = 1; i <= parseInt(numPassengers); i++) {
                let pName = params.get(`p${i}-name`);
                let pAge = params.get(`p${i}-age`);
                let pGender = params.get(`p${i}-gender`);
                if (pName) {
                    ticketText += `- ${pName} (${pAge}/${pGender})\n`;
                }
            }

            const encodedTicketText = encodeURIComponent(ticketText);
            const qrImageUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodedTicketText}`;

            const qrCodeEl = document.getElementById("qr-code");
            qrCodeEl.src = qrImageUrl;

            // Show image once loaded
            qrCodeEl.onload = () => {
                qrCodeEl.classList.remove("hidden");
            };
        });
    </script>
</body>

</html>
