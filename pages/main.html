<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../style/variables.css" />
    <title>Booking - BharatRail</title>

    <link rel="stylesheet" href="../style/navbar.css" />
    <link rel="stylesheet" href="../style/footer.css" />
    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>

<body class="bg-[#F5F7FA] text-slate-800 font-sans min-h-screen">
    <nav class="navbar"></nav>

    <header>
        <div class="flex justify-center items-center mt-[100px] mb-6">
            <h1
                class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-800 to-blue-600 tracking-tight">
                Plan Your Journey</h1>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 relative z-10 pb-12">
        <div
            class="bg-white rounded-[2rem] shadow-2xl shadow-indigo-900/5 ring-1 ring-slate-100 p-6 sm:p-8 w-full flex flex-col gap-5">
            <div class="flex items-center gap-5 group">
                <div
                    class="w-12 h-12 shrink-0 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center transition-colors group-hover:bg-indigo-100">
                    <i data-lucide="map-pin" class="w-5 h-5"></i>
                </div>
                <div
                    class="w-full border-b-2 border-slate-100 pb-2 group-focus-within:border-indigo-500 transition-colors">
                    <label class="text-[11px] font-bold text-slate-400 uppercase tracking-wider block mb-1">From
                        Station</label>
                    <input type="text" list="list-container" id="source" value="Howrah"
                        class="w-full text-xl font-bold text-slate-800 bg-transparent outline-none placeholder-slate-300 capitalize"
                        placeholder="Enter Source" />
                    <datalist id="list-container">
                    </datalist>
                </div>
            </div>

            <div class="relative py-2 flex justify-end pr-3 -my-4 z-10 pointer-events-none">
                <button id="swap"
                    class="pointer-events-auto bg-white border border-slate-200 shadow-md shadow-slate-200/50 w-10 h-10 rounded-full flex items-center justify-center text-indigo-600 hover:bg-indigo-50 hover:border-indigo-200 transition-all active:scale-95 cursor-pointer">
                    <i data-lucide="arrow-left-right" class="rotate-90 w-4 h-4 stroke-[3px]"></i>
                </button>
            </div>

            <div class="flex items-center gap-5 group">
                <div
                    class="w-12 h-12 shrink-0 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center transition-colors group-hover:bg-indigo-100">
                    <i data-lucide="map-pin" class="w-5 h-5"></i>
                </div>
                <div
                    class="w-full border-b-2 border-slate-100 pb-2 group-focus-within:border-indigo-500 transition-colors">
                    <label class="text-[11px] font-bold text-slate-400 uppercase tracking-wider block mb-1">To
                        Station</label>
                    <input type="text" list="list-container" id="destination" value="Burdwan"
                        class="w-full text-xl font-bold text-slate-800 bg-transparent outline-none placeholder-slate-300 capitalize"
                        placeholder="Enter Destination" />
                </div>
            </div>
            <div class="flex justify-between gap-5 mt-2 max-sm:flex-col">
                <div class="flex flex-col flex-1">
                    <label for="date" class="text-[11px] font-bold text-slate-400 uppercase tracking-wider block mb-2">
                        Departure Date</label>
                    <input type="date" name="date" id="date"
                        class="appearance-none bg-slate-50 text-slate-700 font-medium border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all w-full"
                        placeholder="Choose a Date" />
                </div>
                <div class="flex flex-col flex-1">
                    <label for="class" class="text-[11px] font-bold text-slate-400 uppercase tracking-wider block mb-2">
                        Class</label>
                    <input type="text" list="train-class" value="" name="class" id="class"
                        class="appearance-none bg-slate-50 text-slate-700 font-medium border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all w-full"
                        placeholder="Choose a Class" />
                    <datalist class="bg-amber-300" id="train-class">
                        <option value="All Classes"></option>
                        <option value="AC First Class (1A)"></option>
                        <option value="AC 2 Tier (2A)"></option>
                        <option value="AC 3 Tier (3A)"></option>
                        <option value="AC 3 Economy (3E)"></option>
                        <option value="Sleeper (SL)"></option>
                        <option value="Second Sitting (2S)"></option>
                    </datalist>
                </div>
            </div>

            <button id="Search"
                class="mt-4 bg-gradient-to-r from-orange-500 to-rose-500 hover:from-orange-600 hover:to-rose-600 text-white w-full py-4 rounded-[1rem] font-bold text-lg flex items-center justify-center gap-2 shadow-lg shadow-orange-500/25 transition-all active:scale-[0.98] cursor-pointer">
                <i data-lucide="search" class="w-5 h-5"></i> Find trains
            </button>
        </div>

        <div class="trainNumber relative mt-10 h-14 max-w-md mx-auto">
            <label
                class="absolute top-0 z-10 font-sans text-[10px] font-extrabold uppercase tracking-widest -translate-y-2.5 left-6 px-2 bg-indigo-50 text-indigo-700 rounded shadow-sm"
                for="pnr">PNR Search</label>
            <input type="text" list="pnrList" value="L001" id="pnr" placeholder="Enter PNR Here"
                class="text-slate-700 w-full h-14 bg-white pl-6 pr-14 shadow-xl shadow-indigo-900/5 ring-1 ring-slate-100 rounded-full outline-none focus:ring-indigo-500 focus:shadow-indigo-500/10 transition-all font-bold placeholder-slate-300" />
            <button id="pnrSearch" type="button" aria-label="Search PNR"
                class="absolute top-2 right-2 z-20 h-10 w-10 border-0 rounded-full text-white bg-indigo-600 flex justify-center items-center hover:bg-indigo-700 shadow-md shadow-indigo-600/20 active:scale-95 transition-all cursor-pointer">
                <i data-lucide="search" class="w-4 h-4 text-white"></i>
            </button>
            <datalist id="pnrList">

            </datalist>
        </div>
        <div id="result" class="mt-10 space-y-6">
        </div>
    </main>

    <footer class="footer"></footer>
    <script src="../src/navbar.js"></script>
    <script src="../src/searchEngineMachine.js" type="module"></script>
    <!-- <script>
        lucide.createIcons();
    </script> -->
</body>

</html>
