<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main - BharatRail</title>
    <link rel="stylesheet" href="../style/main.css">
    <link rel="stylesheet" href="../style/navbar.css">
    <link rel="stylesheet" href="../style/footer.css">
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <nav class="navbar"></nav>

    <div class="way">
        <div class="w sel">One way</div>
        <div class="w sel">Round</div>
        <div class="w sel">Multi-city</div>
    </div>

    <div class="main">
        <div class="ft">
            <fieldset class="from">
                <legend>From</legend>     
            <div class="inner">
                <i data-lucide="arrow-right" class="Rail"></i>
                <div class="st">
                    <div class="place">
                        <input type="text" id="Source" value="Chennai" class="m bg-transparent border-none outline-none font-bold text-lg w-full" placeholder="From Station">
                        <p class="sh text-xs text-gray-400">CHE</p>
                    </div>
                    <p class="text-xs text-gray-500">Central Railway Station</p>
                </div>
            </div>
            </fieldset>
        <fieldset class="to">
            <legend>To</legend>
            <div class="inner">
                 <i data-lucide="arrow-left" class="Rail"></i>
                 <div class="st">
                    <div class="place">
                        <input type="text" id="Destination" value="Kerala" class="m bg-transparent border-none outline-none font-bold text-lg w-full" placeholder="To Station">
                        <p class="sh text-xs text-gray-400">KL</p>
                     </div>
                    <p class="text-xs text-gray-500">Thiruvananthapuram Central Station</p>
                 </div>
            </div>
        </fieldset>
        </div>
        <div class="dr">
             <fieldset class="depart">
                <legend>Departure</legend>
                <i data-lucide="calendar" class="cal"></i>
                <p class="text">26/May/2026</p>
            </fieldset>
            <fieldset class="ret">
                <legend>Return</legend>
                <p class="text">+ Add Return Date</p>
            </fieldset>
        </div>
        <div class="tquota">
            <fieldset class="t">
                <legend>Traveller</legend>
                <p class="text">1 Adult</p>
            </fieldset>
            <fieldset class="quota">
                <legend>Quota</legend>
                <p class="text">General Quota</p>
            </fieldset>
        </div>
    </div>

    <div class="search" onclick="triggerSearch()">
        <p>Search Train</p>
    </div>

    <footer class="footer"></footer>

    <script src="../src/navbar.js"></script>
    <script src="../src/search.js"></script>
</body>
</html>
