<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main</title>
    <link rel="stylesheet" href="../style/main.css">
    <link rel="stylesheet" href="../style/navbar.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo-container">
            <img src="../assets/new_logo.jpeg" alt="Bharat Rail Logo" class="logo">
        </div>
        <ul class="nav-links">
            <li><a href="../index.html">Home</a></li>
            <li><a href="login.html" id="nav-login-link">Login</a></li>
            <li><a href="#">Bookings</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
        <div class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>


    <div class="way">
        <div class="w sel">One way</div>
        <div class="w sel">Round</div>
        <div class="w sel">Multi-city</div>
    </div>

    <div class="main">
        <div class="ft">
            <fieldset class="from">
                <legend>From</legend>     
            <div class="inner">
                <img src="../assets/right.png" alt="Train from" class="Rail">       
                <div class="st">
                    <div class="place">
                    <p class="m">Chennai</p> 
                    <p class="sh">CHE</p>
                </div>
                    <p>Central Railway Station</p>
                </div>
            </div>
            </fieldset>
        <fieldset class="to">
            <legend>To</legend>
            <div class="inner">
                 <img src="../assets/left.png" alt="Train from" class="Rail"> 
                 <div class="st">
                    <div class="place">
                        <p class="m">Kerala</p>
                        <p class="sh">KL</p>
                     </div>
                    <p>Thiruvananthapuram Central Station</p>
                 </div>
            </div>
        </fieldset>
        </div>
        <div class="dr">
            <fieldset class="depart">
                <legend>Departure</legend>
                <img src="../assets/cal.png" alt="Train from" class="cal"> 
                <p class="text">26/May/2026</p>
            </fieldset>
            <fieldset class="ret">
                <legend>Return</legend>
                <p class="text">+ Add Return Date</p>
            </fieldset>
        </div>
        <div class="tquota">
            <fieldset class="t">
                <legend>Traveller</legend>
                <p class="text">1 Adult</p>
            </fieldset>
            <fieldset class="quota">
                <legend>Quota</legend>
                <p class="text">General Quota</p>
            </fieldset>
        </div>
    </div>

    <div class="search">
        <p>Search Train</p>
    </div>   
</body>
</html>
