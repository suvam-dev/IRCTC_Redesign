<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../style/variables.css" />
    <title>Booking - BharatRail</title>

    <link rel="stylesheet" href="../style/navbar.css" />
    <link rel="stylesheet" href="../style/footer.css" />
    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>

<body class="bg-gray-100 text-gray-900 font-sans min-h-screen">
    <nav class="navbar"></nav>

    <header>
        <div class="flex justify-center items-center mt-[100px]">
            <h1 class="text-xl font-bold tracking-wide">Lets Plan Your Trip</h1>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 mt-5 relative z-10 pb-12">
        <div
            class="bg-white rounded-2xl shadow-xl shadow-black/10 border border-gray-200 p-5 w-full flex flex-col gap-4">
            <div class="flex items-center gap-4 group">
                <div class="w-10 h-10 shrink-0 bg-gray-200 text-gray-800 rounded-full flex items-center justify-center">
                    <i data-lucide="map-pin"></i>
                </div>
                <div class="w-full border-b border-slate-200 pb-2 group-focus-within:border-gray-800 transition-colors">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">From
                        Station</label>
                    <input type="text" list="list-container" id="source" value="Howrah"
                        class="w-full text-lg font-bold text-slate-800 bg-transparent outline-none placeholder-slate-300 capitalize"
                        placeholder="Enter Source" />
                    <datalist id="list-container">
                    </datalist>
                </div>
            </div>

            <div class="relative py-2 flex justify-end pr-2 -my-2 z-10">
                <button
                    class="bg-white border border-slate-200 shadow-sm w-9 h-9 rounded-full flex items-center justify-center text-gray-800 hover:bg-gray-200 transition-colors active:rotate-180 cursor-pointer">
                    <i data-lucide="arrow-left-right" class="rotate-90"></i>
                </button>
            </div>

            <div class="flex items-center gap-4 group">
                <div class="w-10 h-10 shrink-0 bg-gray-200 text-gray-800 rounded-full flex items-center justify-center">
                    <i data-lucide="map-pin"></i>
                </div>
                <div class="w-full border-b border-slate-200 pb-2 group-focus-within:border-gray-800 transition-colors">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">To
                        Station</label>
                    <input type="text" list="list-container" id="destination" value="Burdwan"
                        class="w-full text-lg font-bold text-slate-800 bg-transparent outline-none placeholder-slate-300 capitalize"
                        placeholder="Enter Destination" />
                </div>
            </div>
            <div class="flex justify-between p-1.5 max-sm:flex-col max-sm:gap-2">
                <div class="flex flex-col ">
                    <label for="Date" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">
                        Departure Date</label>
                    <input type="date" name="date" id="date"
                        class="appearance-none bg-transparent text-gray-800 border-2 border-gray-200 rounded-md px-3 py-2 focus:outline-none focus:ring-0 focus:border-gray-800 selection:bg-transparent selection:text-inherit flex-1 max-sm:w-[20rem]  "
                        placeholder="Choose a Date" />
                </div>
                <div class="flex flex-col pd-1">
                    <label for="class"
                        class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1 ">
                        Class</label>
                    <input type="text" list="train-class" value="" name="class" id="class"
                        class="appearance-none bg-transparent text-gray-800 border-2 border-gray-200 rounded-md px-3 py-3 focus:outline-none focus:ring-0 focus:border-gray-800 selection:bg-transparent selection:text-inherit flex-1 max-sm:w-[20rem]"
                        placeholder="Choose a Class" />
                    <datalist class="bg-amber-300" id="train-class">
                        <option value="All Classes"></option>
                        <option value="AC First Class (1A)"></option>
                        <option value="AC 2 Tier (2A)"></option>
                        <option value="AC 3 Tier (3A)"></option>
                        <option value="AC 3 Economy (3E)"></option>
                        <option value="Sleeper (SL)"></option>
                        <option value="Second Sitting (2S)"></option>
                    </datalist>
                </div>
            </div>

            <button id="Search"
                class="mt-4 bg-black hover:bg-gray-800 text-white w-full py-3.5 rounded-xl font-bold text-lg flex items-center justify-center gap-2 shadow-lg shadow-black/25 transition-all active:scale-[0.98] cursor-pointer">
                <i data-lucide="search"></i> Find trains
            </button>
        </div>
        <div class="trainNumber relative mt-4 h-16 max-sm:h-24">
            <label
                class="absolute top-0 z-10 font-sans text-[10px] font-extrabold -translate-y-1.5 left-4 p-0.5 px-1 bg-gray-50 shadow-2xl shadow-gray-500 rounded-md text-gray-500"
                for="pnr">Train Search:</label>
            <input type="text" value="" id="pnr" placeholder="Enter train number"
                class="text-gray-600 w-full h-12 place-content-center px-4 absolute shadow-2xl shadow-gray-300 top-0 rounded-full border-0 font-extrabold" />
            <button id="search" type="button" aria-label="Search train number"
                class="absolute top-1 right-1 z-20 h-10 w-10 rounded-full text-white bg-black border border-white/20 flex justify-center items-center hover:bg-gray-800 ">
                <i data-lucide="search" class="text-white"></i>
            </button>
        </div>
        <div id="result" class="mt-8"></div>
    </main>

    <footer class="footer"></footer>
    <script src="../src/navbar.js"></script>
    <script src="../src/searchEngineMachine.js" type="module"></script>
    <!-- <script>
        lucide.createIcons();
    </script> -->
</body>

</html>
