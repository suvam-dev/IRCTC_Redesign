<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main</title>
    <link rel="stylesheet" href="../style/main.css">
</head>
<body>
    <div class="nav">
        <div class="h">
            <a id="home"></a>
            <p id="ele">Home</p>
        </div>
        <div class="book">
            <a id="book"></a>
            <p id="ele">Booking</p>
        </div>
        <div class="offer">
            <a id="celeb"></a>
            <p id="ele">Offer</p>
        </div>
        <div class="inbox">
            <a id="mail"></a>
            <p id="ele">Inbox</p>
        </div>
        <div class="profile">
            <a id="man"></a>
            <p id="ele">Profile</p>
        </div>
    </div>

    <div class="name">
        <h5> Ram </h5>
        <a id="bell"></a>
    </div>

    <div class="way">
        <div class="w sel">One way</div>
        <div class="w sel">Round</div>
        <div class="w sel">Multi-city</div>
    </div>

    <div class="main">
        <div class="from">
           <p>From</p>
           <div class="place">
             <p class="m">Chennai</p> 
             <p class="sh">CHE</p>
           </div>
           <p>Central Railway Station</p>
        </div>
        <a id="rev"></a>
        <div class="to">
            <p>To</p>
            <div class="place">
              <p class="m">Kerala</p>
              <p class="sh">KL</p>
            </div>
            <p>Thiruvananthapuram Central Station</p>
        </div>
        <div class="dr">
            <div class="depart">
                <p>Departure</p>
                <a id="calen"></a>
                <p>26/May/2026</p>
            </div>
            <div class="ret">
                <p>Return</p>
                <p>+Add Return Date</p>
            </div>
        </div>
        <div class="tquota">
            <div class="t">
                <p>Traveller</p>
                <p>1 Adult</p>
            </div>
            <div class="quota">
                <p>Quota</p>
                <p>General Quota</p>
            </div>
        </div>
    </div>

    <div class="search">
        <p>Search Train</p>
    </div>   
</body>
</html>
