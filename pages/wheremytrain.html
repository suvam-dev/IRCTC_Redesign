<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Where is my train</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  </head>
  <body class="bg-slate-50 text-slate-800 font-sans min-h-screen">
    
    <header class="bg-blue-600 text-white pt-6 pb-20 px-4 rounded-b-[2.5rem] shadow-md relative z-0">
      <div class="max-w-md mx-auto flex items-center justify-center">
        <h1 class="text-xl font-bold tracking-wide">
          <i class="fa-solid fa-train-subway mr-2"></i> Where is my Train
        </h1>
      </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 -mt-14 relative z-10 pb-12">
      
      <div class="bg-white rounded-2xl shadow-xl shadow-blue-900/5 border border-slate-100 p-5 w-full flex flex-col gap-4">        
        <div class="flex items-center gap-4 group">
          <div class="w-10 h-10 shrink-0 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center">
            <i class="fa-solid fa-location-dot"></i>
          </div>
          <div class="w-full border-b border-slate-200 pb-2 group-focus-within:border-blue-500 transition-colors">
            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">From Station</label>
            <input type="text" value="Howrah" class="w-full text-lg font-bold text-slate-800 bg-transparent outline-none placeholder-slate-300 capitalize" placeholder="Enter Source">
          </div>
        </div>

        <div class="relative py-2 flex justify-end pr-2 -my-2 z-10">
          <button class="bg-white border border-slate-100 shadow-sm w-9 h-9 rounded-full flex items-center justify-center text-blue-600 hover:bg-blue-50 transition-colors active:rotate-180 cursor-pointer">
             <i class="fa-solid fa-arrow-right-arrow-left rotate-90"></i>
          </button>
        </div>

        <div class="flex items-center gap-4 group">
          <div class="w-10 h-10 shrink-0 bg-red-50 text-red-500 rounded-full flex items-center justify-center">
            <i class="fa-solid fa-location-dot"></i>
          </div>
          <div class="w-full border-b border-transparent pb-2 group-focus-within:border-red-500 transition-colors">
            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">To Station</label>
            <input type="text" value="Burdwan" class="w-full text-lg font-bold text-slate-800 bg-transparent outline-none placeholder-slate-300 capitalize" placeholder="Enter Destination">
          </div>
        </div>

        <button class="mt-4 bg-blue-500 hover:bg-green-600 text-white w-full py-3.5 rounded-xl font-bold text-lg flex items-center justify-center gap-2 shadow-lg shadow-green-500/30 transition-all active:scale-[0.98] cursor-pointer">
          <i class="fa-solid fa-magnifying-glass"></i> Find trains
        </button>

      </div>

      <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mt-10 mb-4 px-2 flex items-center gap-2">
        <i class="fa-solid fa-clock-rotate-left"></i> Recent Searches
      </h2>

      <div id="dynamic-content-container" class="flex flex-col gap-3"></div>

    </main>

    <script>
      const recentSearches = [
        { type: 'train', number: '13017', name: 'ganadevata express' },
        { type: 'station', name: 'Hijli' }
      ];

      const historyLogs = ['advchjmw', 'dbewvs', 'ewhke'];

      const container = document.getElementById('dynamic-content-container');
      let htmlContent = '';

      recentSearches.forEach((item) => {
        const isTrain = item.type === 'train';
        const icon = isTrain ? 'fa-train' : 'fa-tower-broadcast';
        const iconBg = isTrain ? 'bg-emerald-50 text-emerald-600' : 'bg-purple-50 text-purple-600';
        const title = isTrain ? item.number : item.name;
        const subtext = isTrain ? item.name : 'Live Station Status';
        const badge = !isTrain ? `<span class="bg-red-100 text-red-600 text-[9px] uppercase font-bold py-0.5 px-2 rounded-md animate-pulse ml-2">Live</span>` : '';

        htmlContent += `
          <div class="bg-white border border-slate-100 p-4 rounded-xl shadow-sm hover:shadow-md transition-shadow cursor-pointer flex items-center justify-between group">
            <div class="flex items-center gap-4">
              <div class="w-11 h-11 shrink-0 ${iconBg} rounded-xl flex items-center justify-center group-hover:scale-105 transition-transform">
                <i class="fa-solid ${icon} text-lg"></i>
              </div>
              <div>
                <div class="flex items-center">
                  <p class="font-bold text-slate-800 text-lg">${title}</p>
                  ${badge}
                </div>
                <p class="text-sm font-medium text-slate-500 capitalize">${subtext}</p>
              </div>
            </div>
            <i class="fa-solid fa-chevron-right text-slate-300 group-hover:text-slate-500 transition-colors text-sm"></i>
          </div>
        `;
      });

      if (historyLogs.length > 0) {
        htmlContent += `<div class="flex items-center gap-2 overflow-x-auto pb-2 mt-2 hide-scrollbar">`;
        
        historyLogs.forEach((log) => {
          htmlContent += `
            <div class="bg-white border border-slate-200 px-4 py-2 rounded-full text-sm font-semibold text-slate-600 whitespace-nowrap cursor-pointer hover:bg-slate-50 hover:border-slate-300 transition-colors shadow-sm active:scale-95 flex items-center gap-2 shrink-0">
              <i class="fa-regular fa-clock text-slate-400"></i> ${log}
            </div>
          `;
        });
        
        htmlContent += `</div>`;
      }

      container.innerHTML = htmlContent;
    </script>
    
    <style>
      .hide-scrollbar::-webkit-scrollbar { display: none; }
      .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
  </body>
</html>
