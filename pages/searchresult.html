<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Results - BharatRail</title>
  
  <!-- CSS -->
  <link rel="stylesheet" href="../style/navbar.css">
  <link rel="stylesheet" href="../style/footer.css">
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="bg-gray-50 font-sans">
  <nav class="navbar"></nav>

  <!-- Results Header -->
  <div class="bg-blue-600 text-white py-12 px-6 shadow-md mb-8">
    <div class="max-w-4xl mx-auto flex items-center justify-between">
      <div>
        <h1 class="text-3xl font-black tracking-tight mb-2">Search Results</h1>
        <p class="text-blue-100 flex items-center gap-2">
            <i data-lucide="train" class="w-4 h-4"></i> Available trains for your selected route
        </p>
      </div>
      <div class="hidden md:block">
        <button onclick="window.location.href='./main.html'" class="bg-white/10 hover:bg-white/20 text-white px-6 py-2 rounded-xl font-bold border border-white/20 transition-all">
          Modify Search
        </button>
      </div>
    </div>
  </div>

  <main class="px-4 pb-20 max-w-5xl mx-auto min-h-[50vh]">
    <!-- Results will be injected here by search.js -->
    <div id="result" class="flex flex-col gap-6">
        <div class="p-20 text-center animate-pulse">
            <div class="inline-block w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p class="text-gray-400 font-semibold italic">Fetching the best trains for your journey...</p>
        </div>
    </div>
  </main>

  <footer class="footer"></footer>

  <!-- Scripts -->
  <script src="../src/navbar.js"></script>
  <script src="../src/search.js"></script>
</body>
</html>
